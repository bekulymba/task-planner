<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>task planner</title>
    <link rel="icon" type="image/png" href="media/task-planner.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="header-logo">
                <img src="media/task-planner2.png" alt="logo" class="header-logo-image">
                <span class="header-logo-text">Task Planner</span>
            </a>
            <div class="header-about">
                <a href="https://platform.alem.school/git/bekulymba/task-planner" class="header-about-link" target="_blank">About</a>
                <a href="https://www.youtube.com/watch?v=0rncUTrjcmg" class="header-meme-link" target="_blank">Meme</a>
            </div>
        </div>
    </header>
    <main>
        <div class="main-container">

            <button class="new-task">New Task</button>

            <div class="controls">
                <select id="filter">
                    <option value="all">All</option>
                    <option value="active">Active</option>
                    <option value="failed">Failed</option>
                    <option value="completed">Completed</option>
                </select>
                <select id="sort">
                    <option value="date-asc">Date Ascending</option>
                    <option value="date-desc">Date Descending</option>
                    <option value="status-asc">Status Ascending</option>
                    <option value="status-desc">Status Descending</option>
                    <option value="alphabet-asc">Alphabet Ascending</option>
                    <option value="alphabet-desc">Alphabet Descending</option>
                </select>
            </div>
        <ul id="task-list"></ul>
        </div>
    </main>
        <div class="modal" id="edit-modal">
            <div class="modal-content">
                <h2>Edit Task</h2>
                <label>Title</label>
                <input id="edit-task-title" type="text">
                <label>Description</label>
                <textarea id="edit-task-desc"></textarea>
                <button id="edit-save">Save</button>
                <button id="edit-cancel">Cancel</button>
            </div>
        </div>
    <div class="modal" id="delete-modal">
        <div class="modal-content">
            <h2>Delete Task?</h2>
            <button id="delete-confirm">Yes</button>
            <button id="delete-cancel">No</button>
        </div>
    </div>
    <div class="modal" id="complete-modal">
        <div class="modal-content">
            <h2>Complete Task</h2>
            <button id="complete-confirm">Yes</button>
            <button id="complete-cancel">No</button>    
        </div>
    </div>
    <div class="modal" id="new-task-modal">
        <div class="modal-content">
            <h2>New Task</h2>
            <label>Title</label>
            <input id="new-task-title" type="text">
            <label>Description</label>
            <textarea id="new-task-desc"></textarea>
            <button id="new-task-save">Create</button>
            <button id="new-task-cancel">Cancel</button>
        </div>
    </div>
    <div class="modal" id="fail-modal">
        <div class="modal-content">
            <h2>Fail Task</h2>
            <button id="fail-confirm">Yes</button>
            <button id="fail-cancel">No</button>    
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/url.js"></script>
    <script type="module" src="js/filter.js"></script>
    <script type="module" src="js/modals.js"></script>
    <script type="module" src="js/selection.js"></script>
    <script type="module" src="js/storage.js"></script>
 </body>
</html>
